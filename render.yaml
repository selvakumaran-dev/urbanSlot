services:
  # ─── BACKEND API / WEBSOCKETS (Web Service) ───
  - type: web
    name: urbanslot-api
    env: node
    rootDir: server
    buildCommand: npm install
    startCommand: node app.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "5000"
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CLIENT_URL
        fromService:
          type: web
          name: urbanslot-web
          envVarKey: RENDER_EXTERNAL_URL

  # ─── FRONTEND (Static Site) ───
  - type: web
    name: urbanslot-web
    env: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: urbanslot-api
          envVarKey: RENDER_EXTERNAL_URL
